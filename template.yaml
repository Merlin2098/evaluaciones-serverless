AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless pipeline para procesar evaluaciones desde Typeform.
  La API Gateway recibe el webhook, la Lambda procesa la evaluación,
  genera un PDF, guarda resultados en S3 y envía correo mediante SES.

Globals:
  Function:
    Runtime: python3.11
    Timeout: 15
    MemorySize: 256
    Architectures:
      - x86_64

Parameters:

  BucketName:
    Type: String
    Description: Bucket S3 donde se almacenarán los resultados

  ClienteEmail:
    Type: String
    Description: Email destinatario del reporte

  FromEmail:
    Type: String
    Description: Email remitente verificado en SES

Resources:

  EvaluacionesApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Description: API para recibir webhooks de Typeform

  EvaluacionesLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: evaluaciones-dependencies
      Description: Dependencias Python (reportlab, etc)
      Content:
        ContentUri: layer/dependencies.zip
      CompatibleRuntimes:
        - python3.11

  EvaluacionesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: evaluaciones-typeform-processor
      Handler: app.lambda_handler
      CodeUri: lambda/

      Layers:
        - !Ref EvaluacionesLayer

      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          CLIENTE_EMAIL: !Ref ClienteEmail
          FROM_EMAIL: !Ref FromEmail
          SES_REGION: us-east-1
          SES_CONFIG_SET: email-debug

      Policies:
        - S3WritePolicy:
            BucketName: !Ref BucketName

        - Statement:
            - Effect: Allow
              Action:
                - ses:SendRawEmail
              Resource: "*"

      Events:
        ApiEvaluacion:
          Type: Api
          Properties:
            RestApiId: !Ref EvaluacionesApi
            Path: /evaluacion
            Method: post

Outputs:

  ApiEndpoint:
    Description: Endpoint del webhook de Typeform
    Value: !Sub "https://${EvaluacionesApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/evaluacion"

  LambdaFunctionName:
    Description: Nombre de la función Lambda
    Value: !Ref EvaluacionesFunction
